<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transliterator VCF — ukraiński → łacina</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 4px;
    letter-spacing: -.3px;
  }
  .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 36px;
  }
  .subtitle span {
    color: #fbbf24;
    font-weight: 600;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed #2d3148;
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.hover {
    border-color: #6366f1;
    background: rgba(99,102,241,.05);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: block;
  }
  .drop-label {
    font-size: 15px;
    color: #94a3b8;
  }
  .drop-label strong {
    color: #6366f1;
  }
  .drop-hint {
    font-size: 12px;
    color: #475569;
    margin-top: 6px;
  }

  /* File info */
  .file-info {
    display: none;
    align-items: center;
    gap: 14px;
    background: #12151f;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 16px;
  }
  .file-info.visible { display: flex; }
  .file-icon { font-size: 28px; flex-shrink: 0; }
  .file-meta { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-size { font-size: 12px; color: #64748b; margin-top: 2px; }
  .remove-btn {
    background: none;
    border: none;
    color: #475569;
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    border-radius: 6px;
    transition: color .15s;
    flex-shrink: 0;
  }
  .remove-btn:hover { color: #ef4444; }

  /* Stats */
  .stats {
    display: none;
    gap: 12px;
    margin-top: 16px;
  }
  .stats.visible { display: flex; }
  .stat {
    flex: 1;
    background: #12151f;
    border: 1px solid #2d3148;
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #6366f1;
  }
  .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }

  /* Button */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    margin-top: 20px;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn:not(:disabled):hover { opacity: .9; }
  .btn:not(:disabled):active { transform: scale(.98); }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
  }
  .btn-download {
    background: linear-gradient(135deg, #10b981, #059669);
    color: #fff;
  }

  /* Status */
  .status {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
  }
  .status.visible { display: flex; }
  .status.ok { background: rgba(16,185,129,.12); color: #34d399; border: 1px solid rgba(16,185,129,.2); }
  .status.err { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.2); }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-top: 20px;
  }
  .preview-wrap.visible { display: block; }
  .preview-label {
    font-size: 11px;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
  }
  .preview {
    background: #0d0f18;
    border: 1px solid #1e2235;
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: #94a3b8;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
  }
  .preview::-webkit-scrollbar { width: 4px; }
  .preview::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: #334155;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Transliterator VCF</h1>
  <p class="subtitle">Ukraiński → łacina &nbsp;·&nbsp; <span>KMU nr 55 / 27.01.2010</span></p>

  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".vcf,.vcard" id="fileInput">
    <span class="drop-icon">📇</span>
    <div class="drop-label"><strong>Wybierz plik</strong> lub przeciągnij tutaj</div>
    <div class="drop-hint">.vcf / .vcard</div>
  </div>

  <div class="file-info" id="fileInfo">
    <span class="file-icon">📄</span>
    <div class="file-meta">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <button class="remove-btn" id="removeBtn" title="Usuń">✕</button>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-value" id="statContacts">0</div><div class="stat-label">kontaktów</div></div>
    <div class="stat"><div class="stat-value" id="statFields">0</div><div class="stat-label">przetłumaczonych pól</div></div>
  </div>

  <button class="btn btn-primary" id="convertBtn" disabled>⚡ Transliteruj</button>

  <div class="status" id="status"></div>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-label">Podgląd wyniku</div>
    <div class="preview" id="preview"></div>
  </div>

  <button class="btn btn-download" id="downloadBtn" style="display:none">⬇ Pobierz plik</button>

  <div class="footer">Działa lokalnie — żaden plik nie opuszcza Twojego komputera.</div>
</div>

<script>
// ── Transliteracja ──────────────────────────────────────────────────────────

const SIMPLE_MAP = {
  'А':'A','а':'a','Б':'B','б':'b','В':'V','в':'v','Г':'H','г':'h',
  'Ґ':'G','ґ':'g','Д':'D','д':'d','Е':'E','е':'e','Ж':'Zh','ж':'zh',
  'З':'Z','з':'z','И':'Y','и':'y','І':'I','і':'i','К':'K','к':'k',
  'Л':'L','л':'l','М':'M','м':'m','Н':'N','н':'n','О':'O','о':'o',
  'П':'P','п':'p','Р':'R','р':'r','С':'S','с':'s','Т':'T','т':'t',
  'У':'U','у':'u','Ф':'F','ф':'f','Х':'Kh','х':'kh','Ц':'Ts','ц':'ts',
  'Ч':'Ch','ч':'ch','Ш':'Sh','ш':'sh','Щ':'Shch','щ':'shch',
  'Ь':'','ь':'','\u2019':'','\u02BC':'',
};
const CONTEXT_MAP = {
  'Є':['Ye','ie'],'є':['ye','ie'],'Ї':['Yi','i'],'ї':['yi','i'],
  'Й':['Y','i'],'й':['y','i'],'Ю':['Yu','iu'],'ю':['yu','iu'],
  'Я':['Ya','ia'],'я':['ya','ia'],
};
const UK_SET = new Set([...Object.keys(SIMPLE_MAP),...Object.keys(CONTEXT_MAP)]);

function isLetter(ch) { return ch && /[A-Za-zА-ЯҐЄІЇа-яґєіїь]/.test(ch); }

function transliterate(text) {
  if (![...text].some(c => UK_SET.has(c))) return text;
  const out = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if ('Зз'.includes(ch) && 'Гг'.includes(text[i+1]||'')) {
      out.push((ch==='З'?'Z':'z') + (text[i+1]==='Г'?'GH':'gh'));
      i++; continue;
    }
    if (ch in SIMPLE_MAP) { out.push(SIMPLE_MAP[ch]); }
    else if (ch in CONTEXT_MAP) { out.push(CONTEXT_MAP[ch][isLetter(text[i-1])?1:0]); }
    else { out.push(ch); }
  }
  return out.join('');
}

// ── VCF ────────────────────────────────────────────────────────────────────

const TRANSLIT_FIELDS = new Set(['FN','N','ORG','TITLE','ROLE','NICKNAME','NOTE','ADR','LABEL','CATEGORIES']);
const FIELD_RE = /^([A-Z][A-Z0-9-]*)([;:])/i;

function shouldTranslit(name) {
  return TRANSLIT_FIELDS.has(name.toUpperCase()) || name.toUpperCase().startsWith('X-');
}

function decodeQP(val) {
  const cleaned = val.replace(/=\r?\n/g,'');
  const bytes = [];
  for (let j = 0; j < cleaned.length; j++) {
    if (cleaned[j]==='=' && /[0-9A-Fa-f]{2}/.test(cleaned.slice(j+1,j+3))) {
      bytes.push(parseInt(cleaned.slice(j+1,j+3),16)); j+=2;
    } else { bytes.push(cleaned.charCodeAt(j)); }
  }
  return new TextDecoder().decode(new Uint8Array(bytes));
}

function processLine(line) {
  const m = line.match(FIELD_RE);
  if (!m || !shouldTranslit(m[1])) return { line, changed: false };
  const col = line.indexOf(':');
  if (col === -1) return { line, changed: false };
  const params = line.slice(0, col);
  const value = line.slice(col+1);
  const isQP = params.toUpperCase().includes('QUOTED-PRINTABLE');
  let transliterated;
  let newParams = params;
  if (isQP) {
    const decoded = decodeQP(value);
    transliterated = transliterate(decoded);
    newParams = params.replace(/;?ENCODING=QUOTED-PRINTABLE/gi,'').replace(/;?CHARSET=[A-Z0-9-]+/gi,'');
  } else {
    transliterated = transliterate(value);
  }
  const changed = transliterated !== value;
  return { line: `${newParams}:${transliterated}`, changed };
}

function processVCF(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const unfolded = [];
  for (const l of lines) {
    if (l.length && (l[0]===' '||l[0]==='\t') && unfolded.length) {
      unfolded[unfolded.length-1] += l.slice(1);
    } else { unfolded.push(l); }
  }

  let contacts = 0, changed = 0;
  const result = unfolded.map(l => {
    if (l.toUpperCase()==='BEGIN:VCARD') contacts++;
    const r = processLine(l);
    if (r.changed) changed++;
    return r.line;
  });

  let out = result.join('\r\n');
  if (!out.endsWith('\r\n')) out += '\r\n';
  return { output: out, contacts, changed };
}

// ── UI ─────────────────────────────────────────────────────────────────────

let currentFile = null;
let outputBlob = null;
let outputName = '';

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileInfo   = document.getElementById('fileInfo');
const fileName   = document.getElementById('fileName');
const fileSize   = document.getElementById('fileSize');
const removeBtn  = document.getElementById('removeBtn');
const convertBtn = document.getElementById('convertBtn');
const downloadBtn= document.getElementById('downloadBtn');
const statusEl   = document.getElementById('status');
const statsEl    = document.getElementById('stats');
const previewWrap= document.getElementById('previewWrap');
const previewEl  = document.getElementById('preview');

function formatSize(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}

function setFile(file) {
  currentFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatSize(file.size);
  fileInfo.classList.add('visible');
  convertBtn.disabled = false;
  hideResults();
}

function clearFile() {
  currentFile = null;
  fileInput.value = '';
  fileInfo.classList.remove('visible');
  convertBtn.disabled = true;
  hideResults();
}

function hideResults() {
  outputBlob = null;
  statusEl.className = 'status';
  statsEl.classList.remove('visible');
  previewWrap.classList.remove('visible');
  downloadBtn.style.display = 'none';
}

function showStatus(msg, type) {
  statusEl.textContent = (type==='ok'?'✓ ':'✕ ') + msg;
  statusEl.className = `status visible ${type}`;
}

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) setFile(e.target.files[0]);
});

removeBtn.addEventListener('click', clearFile);

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('hover');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

convertBtn.addEventListener('click', () => {
  if (!currentFile) return;
  hideResults();
  convertBtn.disabled = true;
  convertBtn.textContent = '⏳ Przetwarzam…';

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const { output, contacts, changed } = processVCF(text);

      outputBlob = new Blob([output], { type: 'text/vcard;charset=utf-8' });
      const base = currentFile.name.replace(/\.[^.]+$/, '');
      outputName = base + '_transliterated.vcf';

      document.getElementById('statContacts').textContent = contacts;
      document.getElementById('statFields').textContent = changed;
      statsEl.classList.add('visible');

      // Podgląd: pierwsze 30 linii
      const preview = output.split('\r\n').slice(0,30).join('\n');
      previewEl.textContent = preview;
      previewWrap.classList.add('visible');

      showStatus(`Przetłumaczono ${changed} pól w ${contacts} kontaktach.`, 'ok');
      downloadBtn.style.display = 'flex';
    } catch(err) {
      showStatus('Błąd: ' + err.message, 'err');
    }
    convertBtn.disabled = false;
    convertBtn.textContent = '⚡ Transliteruj';
  };
  reader.onerror = () => {
    showStatus('Nie można odczytać pliku.', 'err');
    convertBtn.disabled = false;
    convertBtn.textContent = '⚡ Transliteruj';
  };
  reader.readAsText(currentFile, 'utf-8');
});

downloadBtn.addEventListener('click', () => {
  if (!outputBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(outputBlob);
  a.download = outputName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});
</script>
</body>
</html>
