<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transliterator — ukraiński → łacina</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  h1 { font-size: 22px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 36px; }
  .subtitle span { color: #fbbf24; font-weight: 600; }

  .drop-zone {
    border: 2px dashed #2d3148;
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.hover { border-color: #6366f1; background: rgba(99,102,241,.05); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .drop-label { font-size: 15px; color: #94a3b8; }
  .drop-label strong { color: #6366f1; }
  .drop-hint { font-size: 12px; color: #475569; margin-top: 6px; }

  .file-info {
    display: none;
    align-items: center;
    gap: 14px;
    background: #12151f;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 16px;
  }
  .file-info.visible { display: flex; }
  .file-icon { font-size: 28px; flex-shrink: 0; }
  .file-meta { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; color: #64748b; margin-top: 2px; }
  .remove-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; transition: color .15s; flex-shrink: 0; }
  .remove-btn:hover { color: #ef4444; }

  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%; padding: 15px; border-radius: 12px;
    border: none; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity .15s, transform .1s; margin-top: 20px;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn:not(:disabled):hover { opacity: .9; }
  .btn:not(:disabled):active { transform: scale(.98); }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-download { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }

  .status {
    display: none; align-items: center; gap: 10px;
    margin-top: 18px; padding: 12px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
  }
  .status.visible { display: flex; }
  .status.ok { background: rgba(16,185,129,.12); color: #34d399; border: 1px solid rgba(16,185,129,.2); }
  .status.err { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.2); }

  .footer { margin-top: 32px; font-size: 11px; color: #334155; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h1>Transliterator</h1>
  <p class="subtitle">Ukraiński → łacina &nbsp;·&nbsp; <span>KMU nr 55 / 27.01.2010</span></p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput">
    <span class="drop-icon">📄</span>
    <div class="drop-label"><strong>Wybierz plik</strong> lub przeciągnij tutaj</div>
    <div class="drop-hint">dowolny plik tekstowy</div>
  </div>

  <div class="file-info" id="fileInfo">
    <span class="file-icon">📄</span>
    <div class="file-meta">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <button class="remove-btn" id="removeBtn" title="Usuń">✕</button>
  </div>

  <button class="btn btn-primary" id="convertBtn" disabled>⚡ Transliteruj</button>

  <div class="status" id="status"></div>

  <button class="btn btn-download" id="downloadBtn" style="display:none">⬇ Pobierz plik</button>

  <div class="footer">Działa lokalnie — żaden plik nie opuszcza Twojego komputera.</div>
</div>

<script>
const SIMPLE_MAP = {
  'А':'A','а':'a','Б':'B','б':'b','В':'V','в':'v','Г':'H','г':'h',
  'Ґ':'G','ґ':'g','Д':'D','д':'d','Е':'E','е':'e','Ж':'Zh','ж':'zh',
  'З':'Z','з':'z','И':'Y','и':'y','І':'I','і':'i','К':'K','к':'k',
  'Л':'L','л':'l','М':'M','м':'m','Н':'N','н':'n','О':'O','о':'o',
  'П':'P','п':'p','Р':'R','р':'r','С':'S','с':'s','Т':'T','т':'t',
  'У':'U','у':'u','Ф':'F','ф':'f','Х':'Kh','х':'kh','Ц':'Ts','ц':'ts',
  'Ч':'Ch','ч':'ch','Ш':'Sh','ш':'sh','Щ':'Shch','щ':'shch',
  'Ь':'','ь':'','\u2019':'','\u02BC':'',
};
const CONTEXT_MAP = {
  'Є':['Ye','ie'],'є':['ye','ie'],'Ї':['Yi','i'],'ї':['yi','i'],
  'Й':['Y','i'],'й':['y','i'],'Ю':['Yu','iu'],'ю':['yu','iu'],
  'Я':['Ya','ia'],'я':['ya','ia'],
};
const UK_SET = new Set([...Object.keys(SIMPLE_MAP),...Object.keys(CONTEXT_MAP)]);

function isLetter(ch) { return ch && /[A-Za-zА-ЯҐЄІЇа-яґєіїь]/.test(ch); }

function transliterate(text) {
  if (![...text].some(c => UK_SET.has(c))) return text;
  const out = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if ('Зз'.includes(ch) && 'Гг'.includes(text[i+1]||'')) {
      out.push((ch==='З'?'Z':'z') + (text[i+1]==='Г'?'GH':'gh'));
      i++; continue;
    }
    if (ch in SIMPLE_MAP) out.push(SIMPLE_MAP[ch]);
    else if (ch in CONTEXT_MAP) out.push(CONTEXT_MAP[ch][isLetter(text[i-1])?1:0]);
    else out.push(ch);
  }
  return out.join('');
}

let currentFile = null;
let outputBlob = null;
let outputName = '';

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileInfo   = document.getElementById('fileInfo');
const fileName   = document.getElementById('fileName');
const fileSize   = document.getElementById('fileSize');
const removeBtn  = document.getElementById('removeBtn');
const convertBtn = document.getElementById('convertBtn');
const downloadBtn= document.getElementById('downloadBtn');
const statusEl   = document.getElementById('status');

function formatSize(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}

function setFile(file) {
  currentFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatSize(file.size);
  fileInfo.classList.add('visible');
  convertBtn.disabled = false;
  reset();
}

function clearFile() {
  currentFile = null;
  fileInput.value = '';
  fileInfo.classList.remove('visible');
  convertBtn.disabled = true;
  reset();
}

function reset() {
  outputBlob = null;
  statusEl.className = 'status';
  downloadBtn.style.display = 'none';
}

function showStatus(msg, type) {
  statusEl.textContent = (type==='ok'?'✓ ':'✕ ') + msg;
  statusEl.className = `status visible ${type}`;
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
removeBtn.addEventListener('click', clearFile);
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('hover');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

convertBtn.addEventListener('click', () => {
  if (!currentFile) return;
  reset();
  convertBtn.disabled = true;
  convertBtn.textContent = '⏳ Przetwarzam…';

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const result = transliterate(e.target.result);
      outputBlob = new Blob([result], { type: currentFile.type || 'text/plain' });
      const ext = currentFile.name.includes('.') ? '' : '';
      const base = currentFile.name.replace(/(\.[^.]+)$/, '_transliterated$1');
      outputName = base === currentFile.name
        ? currentFile.name.replace(/(\.[^.]+)$/, '_transliterated$1') || currentFile.name + '_transliterated'
        : base;
      showStatus('Gotowe.', 'ok');
      downloadBtn.style.display = 'flex';
    } catch(err) {
      showStatus('Błąd: ' + err.message, 'err');
    }
    convertBtn.disabled = false;
    convertBtn.textContent = '⚡ Transliteruj';
  };
  reader.onerror = () => {
    showStatus('Nie można odczytać pliku.', 'err');
    convertBtn.disabled = false;
    convertBtn.textContent = '⚡ Transliteruj';
  };
  reader.readAsText(currentFile, 'utf-8');
});

downloadBtn.addEventListener('click', () => {
  if (!outputBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(outputBlob);
  a.download = outputName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});
</script>
</body>
</html>
